basePath: /
definitions:
  backend-web_internal_flow_models.CategoryValue:
    properties:
      category:
        type: string
      percentage:
        type: number
      volume:
        type: integer
    type: object
  backend-web_internal_flow_models.DataRequest:
    properties:
      filters:
        allOf:
        - $ref: '#/definitions/backend-web_internal_flow_models.FilterPayload'
        description: |-
          Filters contém os critérios de busca (Idade, Gênero, Classe)
          O 'binding:"required"' avisa ao Gin que este campo não pode ser nulo
      limit:
        type: integer
    required:
    - filters
    type: object
  backend-web_internal_flow_models.DemographicsResponse:
    properties:
      gender:
        items:
          $ref: '#/definitions/backend-web_internal_flow_models.CategoryValue'
        type: array
      socialClass:
        items:
          $ref: '#/definitions/backend-web_internal_flow_models.CategoryValue'
        type: array
    type: object
  backend-web_internal_flow_models.FilterPayload:
    properties:
      ageGroups:
        description: 'Lista de faixas etárias (ex: ["65", "23", "31"])'
        example:
        - 18-24
        - 25-34
        items:
          type: string
        type: array
      genders:
        description: 'Lista de gêneros (ex: ["M", "F"])'
        example:
        - Masculino
        items:
          type: string
        type: array
      socialClasses:
        description: 'Lista de classes sociais (ex: ["A", "B1", C1])'
        example:
        - A
        - B
        items:
          type: string
        type: array
    type: object
  backend-web_internal_flow_models.HourCount:
    properties:
      hour:
        type: integer
      volume:
        type: integer
    type: object
  backend-web_internal_flow_models.MetricsResponse:
    properties:
      flow24h:
        items:
          $ref: '#/definitions/backend-web_internal_flow_models.HourCount'
        type: array
      totalAudience:
        type: integer
    type: object
  backend-web_internal_flow_models.RankingResponse:
    properties:
      name:
        type: string
      volume:
        type: integer
    type: object
  backend-web_internal_flow_models.SpatialResponse:
    properties:
      latitude:
        type: number
      longitude:
        type: number
      weighted_uniques:
        type: integer
    type: object
  internal_user.AdminUpdateUserRequest:
    properties:
      email:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      role:
        enum:
        - admin
        - user
        type: string
    type: object
  internal_user.CreateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
      role:
        enum:
        - admin
        - user
        type: string
    required:
    - email
    - name
    - password
    - role
    type: object
  internal_user.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  internal_user.LoginResponse:
    properties:
      token:
        type: string
    type: object
  internal_user.SignupRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  internal_user.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: admin@backendweb.com
    name: Wander Suporte
  description: 'API unificada: autenticação JWT + dados de fluxo de audiência'
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: VENUS API
  version: "1.0"
paths:
  /admin/users:
    get:
      consumes:
      - application/json
      description: Retorna uma lista de todos os usuários ativos no sistema. Requer
        privilégios de administrador.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_user.User'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Listar todos os usuários
      tags:
      - Admin
    post:
      consumes:
      - application/json
      description: Cria um usuário no sistema. Requer token de administrador.
      parameters:
      - description: Dados do novo usuário
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_user.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_user.User'
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Criar um novo usuário
      tags:
      - Admin
  /admin/users/{id}:
    delete:
      consumes:
      - application/json
      description: Remove um usuário do sistema (Soft Delete). Requer privilégios
        de administrador.
      parameters:
      - description: ID do Usuário
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Deletar um usuário
      tags:
      - Admin
    put:
      consumes:
      - application/json
      description: Permite alterar nome, e-mail ou cargo de um usuário via ID.
      parameters:
      - description: ID do Usuário
        in: path
        name: id
        required: true
        type: integer
      - description: Campos a atualizar
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_user.AdminUpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Atualizar qualquer usuário (Admin)
      tags:
      - Admin
  /api/v1/flow/distribution/demographics:
    post:
      consumes:
      - application/json
      description: Retorna a porcentagem e volume de público por Gênero e Classe Social
      parameters:
      - description: Filtros de busca
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/backend-web_internal_flow_models.DataRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend-web_internal_flow_models.DemographicsResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Distribuição demográfica
      tags:
      - Demografia
  /api/v1/flow/metrics:
    post:
      consumes:
      - application/json
      description: Retorna o total de audiência e o fluxo de pessoas por hora (24h)
      parameters:
      - description: Filtros de busca
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/backend-web_internal_flow_models.DataRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/backend-web_internal_flow_models.MetricsResponse'
        "400":
          description: Filtros inválidos
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Erro interno no servidor
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Obter métricas gerais
      tags:
      - Métricas
  /api/v1/flow/ranking/neighborhoods:
    post:
      consumes:
      - application/json
      description: Retorna o ranking das ruas utilizando geocodificação reversa para
        obter nomes reais
      parameters:
      - description: Filtros de busca e limite
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/backend-web_internal_flow_models.DataRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/backend-web_internal_flow_models.RankingResponse'
              type: array
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Ranking de ruas mais movimentadas
      tags:
      - Ranking
  /api/v1/flow/spatial:
    post:
      consumes:
      - application/json
      description: Retorna pontos de latitude/longitude com volume para o mapa de
        calor
      parameters:
      - description: Filtros de busca
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/backend-web_internal_flow_models.DataRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/backend-web_internal_flow_models.SpatialResponse'
              type: array
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Obter dados espaciais
      tags:
      - Fluxo
  /login:
    post:
      consumes:
      - application/json
      description: Autentica o usuário e retorna um token JWT
      parameters:
      - description: Credenciais de login
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_user.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_user.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Realizar login
      tags:
      - Public
  /signup:
    post:
      consumes:
      - application/json
      description: Cria um novo usuário com role "user" fixo
      parameters:
      - description: Dados do novo usuário
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_user.SignupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_user.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Cadastro público de usuário
      tags:
      - Public
securityDefinitions:
  BearerAuth:
    description: Digite 'Bearer ' seguido do seu token JWT
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
