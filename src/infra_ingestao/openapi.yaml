swagger: "2.0"
info:
  title: Ingestão API
  description: API Gateway para ingestão de dados
  version: "1.0.0"
schemes:
  - https
produces:
  - application/json
paths:
  /ingest:
    post:
      summary: Envia dados para a fila de ingestão
      operationId: ingest
      x-google-backend:
        address: ${cloud_run_url}/ingest
      responses:
        "202":
          description: Mensagem aceita
        "400":
          description: Requisição inválida
        "500":
          description: Erro interno
  /health:
    get:
      summary: Health check
      operationId: health
      x-google-backend:
        address: ${cloud_run_url}/health
      responses:
        "200":
          description: OK
