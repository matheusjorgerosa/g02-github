swagger: "2.0"
info:
  title: Ingestão API
  description: API Gateway para ingestão de dados
  version: "1.0.0"
schemes:
  - https
produces:
  - application/json
paths:
  /ingest:
    post:
      summary: Envia dados para a fila de ingestão
      operationId: ingest
      x-google-backend:
        address: ${cloud_run_url}/ingest
      consumes:
        - application/json
      parameters:
        - in: body
          name: payload
          required: true
          schema:
            type: object
            required:
              - latitude
              - longitude
              - idade
              - classe_social
              - genero
            properties:
              latitude:
                type: number
                format: double
                description: Latitude geográfica do registro
                example: -23.5505
              longitude:
                type: number
                format: double
                description: Longitude geográfica do registro
                example: -46.6333
              idade:
                type: integer
                description: Idade do indivíduo
                example: 30
              classe_social:
                type: string
                description: "Classe social (ex: A, B, C, D, E)"
                example: B
              genero:
                type: string
                description: "Gênero do indivíduo (ex: M, F, NB)"
                example: F
      responses:
        "202":
          description: Mensagem aceita
        "400":
          description: Requisição inválida
        "500":
          description: Erro interno
  /health:
    get:
      summary: Health check
      operationId: health
      x-google-backend:
        address: ${cloud_run_url}/health
      responses:
        "200":
          description: OK
